server {
    listen 80;
    root /var/www/html;
    index index.php index.html;

    # Bloquear ficheiros sensíveis
    location ~* \.(json|db|sqlite|env)$ { deny all; return 404; }
    location ~ /\.                       { deny all; return 404; }

    # Bloquear acesso directo a includes do admin
    location ~ ^/admin/includes/         { deny all; return 404; }

    # Redirecionar HTTP → HTTPS (Railway injeta X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Ficheiros estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3|wav)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  127.0.0.1:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }
}
