    <div id="root"></div>
    <script>
      (function () {
        function n(s) { return (s || '').toLowerCase().replace(/\s+/g, ' ').trim(); }

        function findTopCtaBlock() {
          var blocks = document.querySelectorAll('div.mx-4.mt-4.transition-all.duration-500.ease-out');
          for (var i = 0; i < blocks.length; i++) {
            var el = blocks[i];
            var btn = el.querySelector('button');
            if (!btn) continue;
            var txt = n(btn.textContent);
            if (txt.indexOf('confirmar e liberar') === -1) continue;
            if (txt.indexOf('2800') === -1 && txt.indexOf('€') === -1) continue;
            return el;
          }
          return null;
        }

        function findFormBlock() {
          var input =
            document.querySelector('input[placeholder*="Introduza o seu número MBway"]') ||
            document.querySelector('input[placeholder*="Introduza o seu numero MBway"]') ||
            document.querySelector('input[placeholder*="número MBway"]') ||
            document.querySelector('input[placeholder*="numero MBway"]');
          if (!input) return null;
          return input.closest('div.mx-4') || input.parentElement;
        }

        function run() {
          var ctaBlock = findTopCtaBlock();
          var formBlock = findFormBlock();
          if (!ctaBlock || !formBlock || !formBlock.parentElement) return;

          // Se o CTA ainda estiver acima do form, move para logo abaixo do form.
          var ctaTop = ctaBlock.getBoundingClientRect().top;
          var formTop = formBlock.getBoundingClientRect().top;
          if (ctaTop < formTop) {
            formBlock.parentElement.insertBefore(ctaBlock, formBlock.nextSibling);
          }

          // Cria dois botões distintos: um para Step 1 e outro original do Step 2.
          var stepBtn = ctaBlock.querySelector('button');
          if (stepBtn) {
            var formInput = formBlock.querySelector('input');
            var isStep1Visible = !!(formInput && formInput.offsetParent !== null);

            var step1ProxyBtn = ctaBlock.querySelector('button[data-step1-proxy="true"]');
            if (!step1ProxyBtn) {
              step1ProxyBtn = document.createElement('button');
              step1ProxyBtn.type = 'button';
              step1ProxyBtn.setAttribute('data-step1-proxy', 'true');
              step1ProxyBtn.className = stepBtn.className;
              step1ProxyBtn.style.cssText = stepBtn.style.cssText;
              step1ProxyBtn.textContent = 'PROSSEGUIR';
              step1ProxyBtn.addEventListener('click', function(ev) {
                ev.preventDefault();
                ev.stopPropagation();
                step1ProxyBtn.style.display = 'none';
                stepBtn.style.display = '';
                stepBtn.click();
              });
              stepBtn.insertAdjacentElement('afterend', step1ProxyBtn);
            }

            if (isStep1Visible) {
              stepBtn.style.display = 'none';
              step1ProxyBtn.style.display = '';
            } else {
              stepBtn.style.display = '';
              step1ProxyBtn.style.display = 'none';
            }
          }
        }

        var tries = 0;
        var timer = setInterval(function () {
          tries += 1;
          run();
          if (tries > 100) clearInterval(timer);
        }, 180);

        var mo = new MutationObserver(run);
        mo.observe(document.documentElement, { childList: true, subtree: true });

        window.addEventListener('pageshow', function () {
          // Reaplica o estado correto ao voltar do checkout (bfcache/history).
          setTimeout(run, 0);
          setTimeout(run, 120);
          setTimeout(run, 350);
        });
        window.addEventListener('popstate', function () { setTimeout(run, 0); });
        window.addEventListener('focus', function () { setTimeout(run, 0); });
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) setTimeout(run, 0);
        });
      })();
    </script>
    <script>
      (function () {
        function onlyDigits(v) { return String(v || '').replace(/\D/g, ''); }

        function getNameInput() {
          return document.querySelector('input[placeholder*="Nome completo"]') ||
                 document.querySelector('input[placeholder*="nome completo"]') ||
                 document.querySelector('input[type="text"]');
        }

        function getPhoneInput() {
          return document.querySelector('input[placeholder*="MBway"]') ||
                 document.querySelector('input[placeholder*="MB WAY"]') ||
                 document.querySelector('input[placeholder*="mbway"]') ||
                 document.querySelector('input[type="tel"]');
        }

        function persistPayer() {
          var nameEl = getNameInput();
          var phoneEl = getPhoneInput();
          if (!nameEl || !phoneEl) return;

          var name = (nameEl.value || '').trim();
          var phone = onlyDigits(phoneEl.value || '');
          if (!name || !phone) return;

          var payload = { name: name, phone: phone };
          try { localStorage.setItem('mbway_payer', JSON.stringify(payload)); } catch (e) {}
          try { sessionStorage.setItem('mbway_payer', JSON.stringify(payload)); } catch (e) {}
        }

        // Captura contínua para garantir handoff ao checkout.
        var syncTimer = setInterval(persistPayer, 200);
        setTimeout(function () { clearInterval(syncTimer); }, 20000);

        document.addEventListener('input', persistPayer, true);
        document.addEventListener('change', persistPayer, true);
        document.addEventListener('click', function () { setTimeout(persistPayer, 0); }, true);
      })();
    </script>
